{% extends "base.html" %}

{% block title %}Server Error{% endblock %}

{% block extra_css %}
<style>
	@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
	@keyframes spin-slow { to{transform:rotate(360deg)} }
	@keyframes pulse-glow { 0%,100%{opacity:.15} 50%{opacity:.35} }
	@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.1} }
	@keyframes shake { 0%,100%{transform:translateX(0)} 10%{transform:translateX(-6px)} 20%{transform:translateX(6px)} 30%{transform:translateX(-4px)} 40%{transform:translateX(4px)} 50%{transform:translateX(0)} }
	.anim-float { animation: float 3s ease-in-out infinite }
	.anim-spin { animation: spin-slow 8s linear infinite }
	.anim-pulse { animation: pulse-glow 2.5s ease-in-out infinite }
	.anim-blink { animation: blink 1.2s ease-in-out infinite }
	.anim-blink-slow { animation: blink 2.5s ease-in-out infinite }
	.anim-shake:hover { animation: shake .5s ease-in-out }
	.led { width: 10px; height: 10px; border-radius: 50%; display: inline-block }
</style>
{% endblock %}

{% block content %}
<div class="container">
	<div class="row justify-content-center">
		<div class="col-lg-7 col-md-9 text-center py-5">

			<!-- Floating icon -->
			<div class="anim-float mb-4">
				<div class="d-inline-flex align-items-center justify-content-center bg-danger bg-opacity-10 rounded-circle" style="width:130px;height:130px">
					<div class="d-inline-flex align-items-center justify-content-center bg-danger bg-opacity-25 rounded-circle" style="width:100px;height:100px">
						<i class="bi bi-fire text-danger" style="font-size:48px"></i>
					</div>
				</div>
			</div>

			<!-- Big 500 -->
			<h1 class="display-1 fw-bolder text-danger opacity-75 mb-0 lh-1" style="font-size:clamp(6rem,15vw,10rem);letter-spacing:-4px">
				500
			</h1>

			<!-- Title & description -->
			<h2 class="fw-bold text-dark mt-3 mb-3">Something Went Wrong</h2>
			<p class="text-muted fs-5 mb-4 px-md-5">
				We're already on it — please try again in a moment.
			</p>

			<!-- Server rack -->
			<div class="d-flex flex-column align-items-center gap-2 mb-4">
				<div class="d-flex align-items-center gap-2 bg-dark rounded-3 px-4 py-2 anim-shake" style="width:200px">
					<span class="led bg-danger anim-blink"></span>
					<span class="led bg-danger"></span>
					<span class="led bg-secondary"></span>
					<div class="flex-grow-1"></div>
					<small class="text-white-50 font-monospace" style="font-size:.65rem">SRV-01</small>
				</div>
				<div class="d-flex align-items-center gap-2 bg-dark rounded-3 px-4 py-2 anim-shake" style="width:200px">
					<span class="led bg-secondary"></span>
					<span class="led bg-danger anim-blink-slow"></span>
					<span class="led bg-danger"></span>
					<div class="flex-grow-1"></div>
					<small class="text-white-50 font-monospace" style="font-size:.65rem">SRV-02</small>
				</div>
				<div class="d-flex align-items-center gap-2 bg-dark rounded-3 px-4 py-2 anim-shake" style="width:200px">
					<span class="led bg-danger"></span>
					<span class="led bg-secondary"></span>
					<span class="led bg-danger anim-blink"></span>
					<div class="flex-grow-1"></div>
					<small class="text-white-50 font-monospace" style="font-size:.65rem">SRV-03</small>
				</div>
			</div>

			<!-- Spinning gear -->
			<div class="mb-4">
				<i class="bi bi-gear text-muted anim-spin d-inline-block" style="font-size:28px"></i>
				<span class="text-muted small ms-2 font-monospace">diagnostics running...</span>
			</div>

			<!-- Actions -->
			<div class="d-flex gap-3 justify-content-center flex-wrap">
				<a href="{% url 'index' %}" class="btn btn-primary btn-lg rounded-pill px-4 shadow-sm" tabindex="0" aria-label="Go to homepage">
					<i class="bi bi-house-door me-2"></i>Back to Home
				</a>
				<button onclick="location.reload()" class="btn btn-outline-danger btn-lg rounded-pill px-4" tabindex="0" aria-label="Reload page">
					<i class="bi bi-arrow-clockwise me-2"></i>Try Again
				</button>
			</div>

		</div>
	</div>
</div>
{% endblock %}
