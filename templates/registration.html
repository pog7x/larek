{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}

<div class="container">
	<div class="d-flex flex-column p-5">
		<h3 class="mb-3 fs-3">Sign Up</h3>
		<form method="post">
			{% csrf_token %}
			<div class="mb-3">
				<input type="text" name="username" class="form-control" id="username" placeholder="Username" autocapitalize="none" autocomplete="username" autofocus="" required="">
			</div>
			<div class="mb-3">
				<input type="email" name="email" class="form-control" id="email" placeholder="Email" maxlength="320" required="">
			</div>
			<div class="mb-3">
				<input type="password" name="password1" class="form-control" id="password1" placeholder="Password" autocomplete="new-password" required="">
			</div>
			<div class="mb-3">
				<input type="password" name="password2" class="form-control" id="password2" placeholder="Password confirmation" autocomplete="new-password" required="">
			</div>
			<div class="d-flex justify-content-end">
				<input class="btn btn-primary me-2" type="submit" value="Sign Up" />
				<a class="btn btn-outline-primary" href="{% url 'login' %}">Login</a>
			</div>
		</form>

		{% if form.errors %}
      		{% for field in form %}
				{% for error in field.errors %}
					<div class="text-danger">
						{{ field.label }}: {{ error|escape }}
					</div>
				{% endfor %}
			{% endfor %}
		{% endif %}
	</div>
</div>
{% endblock %}
